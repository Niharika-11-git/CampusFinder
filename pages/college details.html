<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Details</title>

    <link rel="stylesheet" href="../css/college-details.css">
</head>

<body>

    <div class="college-container">

        <h1>GRIET</h1>

        <div class="college-card">

            <h2>College Information</h2>

            <p><strong>Location:</strong> Hyderabad</p>

            <p><strong>NAAC Grade:</strong> A++</p>

            <p><strong>Fee Structure:</strong> ₹1,30,000</p>

            <p><strong>Highest Package:</strong> ₹44 LPA</p>

            <p><strong>Average Package:</strong> ₹6 LPA</p>

            <p><strong>Rating:</strong> ⭐⭐⭐⭐⭐</p>

        </div>

        <div class="college-card">

            <h2>Available Branches</h2>

            <ul>
                <li>CSE</li>
                <li>AIML</li>
                <li>DS</li>
                <li>ECE</li>
            </ul>

        </div>

        <div class="college-card">

            <h2>Cutoff Rank</h2>

            <table>

                <tr>
                    <th>Branch</th>
                    <th>Cutoff Rank</th>
                </tr>

                <tr>
                    <td>CSE</td>
                    <td>2500</td>
                </tr>

                <tr>
                    <td>AIML</td>
                    <td>3500</td>
                </tr>

                <tr>
                    <td>DS</td>
                    <td>4000</td>
                </tr>

            </table>

        </div>

        <button>
            Save College
        </button>

    </div>

</body>

</html>
