<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="../css/admin-dashboard.css">
</head>

<body>

    <div class="sidebar">

        <h2>Admin Panel</h2>

        <ul>
            <li><a href="#">Dashboard</a></li>
            <li><a href="#">Add College</a></li>
            <li><a href="#">Manage Colleges</a></li>
            <li><a href="#">Students</a></li>
            <li><a href="#">Reviews</a></li>
            <li><a href="#">Logout</a></li>
        </ul>

    </div>

    <div class="main-content">

        <h1>Welcome Admin</h1>

        <div class="stats">

            <div class="card">
                <h2>150+</h2>
                <p>Total Colleges</p>
            </div>

            <div class="card">
                <h2>500+</h2>
                <p>Students</p>
            </div>

            <div class="card">
                <h2>1200+</h2>
                <p>Reviews</p>
            </div>

        </div>

        <div class="college-form">

            <h2>Add New College</h2>

            <input type="text" placeholder="College Name">

            <input type="text" placeholder="Branches">

            <input type="text" placeholder="Fee Structure">

            <input type="text" placeholder="Cutoff Rank">

            <button>Add College</button>

        </div>

    </div>

</body>

</html>
